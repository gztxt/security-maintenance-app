<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>安防维保管理系统</title>
    <link rel="manifest" href="/static/manifest.json?v=4">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="icon" href="/static/favicon.ico" type="image/svg+xml">
    <meta name="theme-color" content="#2d5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<div class="header"><h1>🛡️ 安防维保管理系统</h1></div>
<div id="loading" class="loading"><div class="spinner"></div><div>加载中...</div></div>

<!-- 日志 -->
<div id="page-log" class="page-content active">
    <div class="day-navigation">
        <button class="date-nav-btn" id="btnPrev">◀</button>
        <div class="date-display" id="btnPickDate">--</div>
        <button class="date-nav-btn" id="btnNext">▶</button>
    </div>
    <div class="card">
        <div class="card-title">📝 维保记录</div>
        <div class="form-group">
            <label>巡查地点</label>
            <input type="text" id="iptLoc" placeholder="输入巡查地点">
        </div>
        <div class="form-group">
            <label>工作内容</label>
            <textarea id="iptWork" placeholder="输入维保记录（支持粘贴长文本）"></textarea>
        </div>
        <div class="save-status" id="saveStatus"></div>
    </div>
    <div class="card">
        <div class="card-title">📸 现场照片（最多4张）</div>
        <div class="image-grid" id="imgGrid"></div>
        <div style="margin-top:8px;">
            <button class="btn btn-sm btn-primary btn-block" id="btnAlbum">🖼️ 从相册选取照片</button>
        </div>
        <input type="file" id="albumInput" accept="image/*" multiple style="display:none">
    </div>
</div>

<!-- 报告 -->
<div id="page-report" class="page-content">
    <div class="card">
        <div class="card-title">📄 月度报告</div>
        <div class="form-group" style="display:flex;gap:10px;align-items:end;">
            <div style="flex:1;">
                <label>选择年月</label>
                <div style="display:flex;gap:6px;">
                    <select id="inpYear" style="flex:1;height:44px;font-size:16px;border-radius:8px;border:1px solid var(--border);padding:4px 8px;"></select>
                    <select id="inpMonth" style="flex:1;height:44px;font-size:16px;border-radius:8px;border:1px solid var(--border);padding:4px 8px;"></select>
                </div>
            </div>
            <button class="btn btn-gold btn-lg" id="btnGenReport" style="height:44px;">📋 生成报告</button>
        </div>
    </div>
    <div class="card">
        <div class="card-title">📂 已生成的报告</div>
        <div id="reportList"><div class="loading" style="padding:20px;"><div class="spinner"></div></div></div>
    </div>
</div>

<!-- 设置 -->
<div id="page-settings" class="page-content">
    <div class="card">
        <div class="card-title">⚙️ 系统设置</div>
        <div class="form-group"><label>项目名称</label><input type="text" id="setProject"></div>
        <div class="form-group"><label>委托单位</label><input type="text" id="setClient"></div>
        <div class="form-group"><label>外委单位</label><input type="text" id="setContractor"></div>
    </div>
    <div class="card">
        <div class="card-title">ℹ️ 关于</div>
        <div style="font-size:13px;color:var(--text-light);line-height:1.8;">
            <div>版本: v2.1</div>
            <div>服务器: 192.168.5.102:5001</div>
        </div>
    </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <div class="nav-item active" data-tab="log"><div class="nav-icon">📝</div><div class="nav-label">日志</div></div>
    <div class="nav-item" data-tab="report"><div class="nav-icon">📄</div><div class="nav-label">报告</div></div>
    <div class="nav-item" data-tab="settings"><div class="nav-icon">⚙️</div><div class="nav-label">设置</div></div>
</div>

<div class="toast" id="toast"></div>
<script src="/static/js/app.js?v=4"></script>
</body>
</html>
