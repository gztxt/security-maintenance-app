name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="安防维保管理系统" app.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 安防维保管理系统-windows
        path: dist/安防维保管理系统.exe
        retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout WebView template
      uses: actions/checkout@v4
      with:
        repository: gztxt/android-webview-template
        path: android-template
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        cd android-template
        gradle wrapper --gradle-version=8.9
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Rename APK
      run: |
        cp android-template/app/build/outputs/apk/release/app-release-unsigned.apk android-template/app/build/outputs/apk/release/安防维保管理系统.apk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: 安防维保管理系统-android
        path: android-template/app/build/outputs/apk/release/安防维保管理系统.apk
        retention-days: 7

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: 安防维保管理系统-windows
        path: artifacts/windows
    
    - name: Download Android artifact
      uses: actions/download-artifact@v4
      with:
        name: 安防维保管理系统-android
        path: artifacts/android
    
    - name: Create Release
      run: |
        gh release create "v${{ github.run_number }}" \
          --title "安防维保管理系统 v${{ github.run_number }}" \
          --notes "构建号: ${{ github.run_number }}
        提交: ${{ github.sha }}" \
          artifacts/windows/安防维保管理系统.exe \
          artifacts/android/安防维保管理系统.apk
